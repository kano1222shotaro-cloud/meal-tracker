<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>食事管理トラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
:root{
  --bg:#0b0e15; --surface:#12161f; --surface-2:#181d29; --surface-3:#1f2533;
  --border:#262d3d; --border-strong:#36405a;
  --text:#e7eaf2; --text-dim:#9aa4ba; --text-faint:#69728a;
  --accent:#5b9dff; --accent-soft:rgba(91,157,255,0.12); --accent-line:rgba(91,157,255,0.35);
  --ok:#46c98b; --ok-soft:rgba(70,201,139,0.13);
  --warn:#e0a93b; --warn-soft:rgba(224,169,59,0.13);
  --danger:#f2557a; --danger-soft:rgba(242,85,122,0.13);
  --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Noto Sans JP',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;font-weight:400;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.mono{font-family:var(--mono)}
.app{max-width:920px;margin:0 auto;padding:0 14px 110px}
.row{display:flex;align-items:center}
.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.spread{display:flex;align-items:center;justify-content:space-between}
.wrap{flex-wrap:wrap}
.muted{color:var(--text-dim)}.faint{color:var(--text-faint)}
.tiny{font-size:11px}.sm{font-size:12px}.med{font-size:13px}
.b{font-weight:700}.center{text-align:center}.right{text-align:right}

/* top bar */
.topbar{position:sticky;top:0;z-index:40;background:rgba(11,14,21,0.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.topbar-in{max-width:920px;margin:0 auto;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{font-weight:900;font-size:15px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.brand .dot{width:9px;height:9px;border-radius:3px;background:var(--accent);box-shadow:0 0 10px var(--accent-line)}
.cloud{font-family:var(--mono);font-size:10.5px;padding:3px 8px;border-radius:100px;border:1px solid var(--border);color:var(--text-faint);white-space:nowrap}
.cloud.ok{color:var(--ok);border-color:rgba(70,201,139,.3)}
.cloud.err{color:var(--danger);border-color:rgba(242,85,122,.3)}
.cloud.sync{color:var(--accent);border-color:var(--accent-line)}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.card.tight{padding:12px}
.sect-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px}

/* date nav */
.datenav{display:flex;align-items:center;justify-content:center;gap:14px;padding:6px 0}
.datenav .d{font-weight:700;font-size:16px;min-width:150px;text-align:center}
.datenav .dow{color:var(--accent);margin-left:6px}
.nav-btn{width:34px;height:34px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);font-size:16px;color:var(--text-dim);display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:var(--surface-3)}

/* slot */
.slot{margin-bottom:12px}
.slot-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.slot-name{font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px}
.slot-kcal{font-family:var(--mono);font-size:12px;color:var(--text-dim)}
.meal{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:9px 11px;margin-bottom:6px}
.meal:active{background:var(--surface-3)}
.meal-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.meal-sub{font-size:11px;color:var(--text-faint);margin-top:1px}
.meal-kcal{font-family:var(--mono);font-size:12px;color:var(--text-dim);white-space:nowrap}
.add-btn{width:100%;border:1px dashed var(--border-strong);border-radius:10px;padding:9px;color:var(--text-dim);font-size:12.5px;background:transparent}
.add-btn:active{background:var(--surface-2)}
.qty{font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:5px;padding:0 5px}

/* badges */
.badge{font-family:var(--mono);font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:5px;border:1px solid var(--border);color:var(--text-faint);white-space:nowrap}
.badge.pending{color:var(--warn);border-color:rgba(224,169,59,.35);background:var(--warn-soft)}
.badge.hi{color:var(--ok);border-color:rgba(70,201,139,.3)}
.badge.med{color:var(--warn);border-color:rgba(224,169,59,.3)}
.badge.low{color:var(--danger);border-color:rgba(242,85,122,.3)}
.badge.store{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft)}

/* score ring */
.score-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.comp-bar{height:7px;border-radius:4px;background:var(--surface-3);overflow:hidden;flex:1}
.comp-fill{height:100%;border-radius:4px}

/* nutrient table */
.ntab{width:100%;border-collapse:collapse;font-size:12.5px}
.ntab th{text-align:left;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);font-weight:500;padding:6px 6px;border-bottom:1px solid var(--border)}
.ntab td{padding:7px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.ntab tr:last-child td{border-bottom:none}
.ntab .nz{color:var(--text-faint)}
.nbar{height:5px;border-radius:3px;background:var(--surface-3);overflow:hidden;width:100%;min-width:46px}
.grp-h2{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);background:var(--surface-2);padding:4px 8px;border-radius:6px;margin:9px 0 5px}
.nrow{padding:7px 2px;border-bottom:1px solid var(--border)}
.nrow:last-child{border-bottom:none}
.gbar{position:relative;height:9px;border-radius:5px;background:var(--surface-3);overflow:hidden}
.gzone{position:absolute;top:0;bottom:0;background:rgba(70,201,139,0.22)}
.gfill{position:absolute;top:0;bottom:0;left:0;border-radius:5px;min-width:2px}
.gtick{position:absolute;top:-1px;bottom:-1px;width:2px;background:var(--text-dim);opacity:.85}
.nbar > div{height:100%;border-radius:3px}
.val-ok{color:var(--ok)}.val-warn{color:var(--warn)}.val-danger{color:var(--danger)}.val-dim{color:var(--text-dim)}
.grp-h td{background:var(--surface-2);font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:5px 6px}

/* tabs bottom */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(15,19,28,0.94);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;justify-content:center}
.tabbar-in{display:flex;width:100%;max-width:920px}
.tab{flex:1;padding:9px 4px calc(9px + env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-faint);font-size:10px}
.tab.active{color:var(--accent)}
.tab .ic{font-size:18px;line-height:1}

/* inputs */
.in{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-size:13px;outline:none}
.in:focus{border-color:var(--accent-line)}
.lab{display:block;font-size:11px;color:var(--text-faint);margin-bottom:4px}
.btn{background:var(--accent);color:#06101f;font-weight:700;border-radius:9px;padding:10px 14px;font-size:13px}
.btn:active{filter:brightness(.92)}
.btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border);font-weight:500}
.btn.danger{background:var(--danger-soft);color:var(--danger);border:1px solid rgba(242,85,122,.3)}
.btn.sm{padding:6px 10px;font-size:12px}
.chip{font-size:12px;border:1px solid var(--border);background:var(--surface-2);border-radius:100px;padding:6px 13px;color:var(--text-dim)}
.chip.on{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft)}
.seg{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:3px}
.seg button{flex:1;padding:7px;border-radius:7px;font-size:12px;color:var(--text-dim)}
.seg button.on{background:var(--accent-soft);color:var(--accent);font-weight:700}

/* modal */
.ov{position:fixed;inset:0;z-index:60;background:rgba(4,6,11,.66);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:560px){.ov{align-items:center}}
.sheet{width:100%;max-width:560px;max-height:90vh;overflow-y:auto;background:var(--surface);border:1px solid var(--border-strong);border-radius:18px 18px 0 0;padding:16px}
@media(min-width:560px){.sheet{border-radius:18px}}
.sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;position:sticky;top:-16px;background:var(--surface);padding-top:4px}
.sheet-title{font-weight:700;font-size:15px}
.x{width:30px;height:30px;border-radius:8px;background:var(--surface-2);color:var(--text-dim);font-size:16px;display:flex;align-items:center;justify-content:center}
.list-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 11px;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;background:var(--surface-2)}
.list-item:active{background:var(--surface-3)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pfc{display:flex;height:14px;border-radius:7px;overflow:hidden;border:1px solid var(--border)}
.pfc>div{height:100%}
.hr{height:1px;background:var(--border);margin:12px 0;border:none}
.empty{text-align:center;color:var(--text-faint);font-size:12.5px;padding:18px}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
.spin{animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

function toStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function parseD(s){const [y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function today(){return toStr(new Date());}
function addD(s,n){const d=parseD(s);d.setDate(d.getDate()+n);return toStr(d);}
function monthOf(s){return s.slice(0,7);}
function dow(s){return ["日","月","火","水","木","金","土"][parseD(s).getDay()];}
function fmtDate(s){const d=parseD(s);return `${d.getMonth()+1}月${d.getDate()}日`;}
function fmtShort(s){const d=parseD(s);return `${d.getMonth()+1}/${d.getDate()}`;}
function isWeekend(s){const w=parseD(s).getDay();return w===0||w===6;}
const gid=()=>Math.random().toString(36).slice(2,9);
const nowTs=()=>{const d=new Date();const z=-d.getTimezoneOffset();const sign=z>=0?"+":"-";const hh=String(Math.floor(Math.abs(z)/60)).padStart(2,"0");const mm=String(Math.abs(z)%60).padStart(2,"0");return toStr(d)+"T"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+sign+hh+":"+mm;};
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function round(x,d){const p=Math.pow(10,d||0);return Math.round((x||0)*p)/p;}
function fmtNum(x,d){if(x===0)return "0";const r=round(x,d);return d>0?r.toFixed(d):String(r);}

  }catch{}
  return new Promise((resolve)=>{
    const cb="_mcb"+Date.now();
    const timer=setTimeout(()=>{delete window[cb];resolve(null);},9000);
    window[cb]=(data)=>{clearTimeout(timer);delete window[cb];try{if(typeof data==="string")data=JSON.parse(data);resolve(data&&data.food_master!==undefined?data:null);}catch{resolve(null);}};
    const s=document.createElement("script");

function recomputeFlag(st){

  st.missing_nutrient_menus=missing;

function migrate(st){
  if(!st||typeof st!=="object")return freshState();

  if(!st.profile.targets)st.profile.targets=deepCopy(SEED.profile_targets);
  if(!st.scoring_config)st.scoring_config=deepCopy(SEED.scoring_config);
  if(!Array.isArray(st.food_master)||!st.food_master.length)st.food_master=deepCopy(SEED.food_master_seed);

// ═══════════════ 栄養計算 ═══════════════
function foodById(master,id){return master.find(f=>f.id===id)||null;}
// セット(Myメニュー)は members:[{food_id,qty}] を持つ。展開して栄養合算。
function foodNutrients(master,food){
  if(!food)return emptyNutrients();
  if(food.members&&food.members.length){
    const tot=emptyNutrients();
    food.members.forEach(m=>{const f=foodById(master,m.food_id);if(f){const n=foodNutrients(master,f);NKEYS.forEach(k=>tot[k]+=(n[k]||0)*(m.qty||1));}});
    return tot;
  }
  return food.nutrients||emptyNutrients();
}
function mealNutrients(master,meal){
  if(meal.needs_lookup||!meal.food_id)return {n:emptyNutrients(),pending:true};
  const f=foodById(master,meal.food_id);
  if(!f)return {n:emptyNutrients(),pending:true};
  const base=foodNutrients(master,f);const q=meal.qty||1;const o={};
  NKEYS.forEach(k=>o[k]=(base[k]||0)*q);
  return {n:o,pending:false};
}
function dayMeals(st,date){const mo=monthOf(date);const mon=st.logs[mo];if(!mon||!mon.days||!mon.days[date])return [];return mon.days[date].meals||[];}
function sumNutrients(list){const o=emptyNutrients();list.forEach(n=>NKEYS.forEach(k=>o[k]+=(n[k]||0)));return o;}
function dayTotals(st,date){
  const meals=dayMeals(st,date);
  const per={};SLOTS.forEach(s=>per[s.id]=emptyNutrients());
  let anyPending=false;
  meals.forEach(m=>{const {n,pending}=mealNutrients(st.food_master,m);if(pending)anyPending=true;NKEYS.forEach(k=>per[m.slot][k]+=(n[k]||0));});
  const total=sumNutrients(SLOTS.map(s=>per[s.id]));
  return {total,per,anyPending,count:meals.length};
}
function pctE(n,key){const kcalPer={protein_g:4,fat_g:9,carb_g:4,sat_fat_g:9};const e=n.energy_kcal||0;if(e<=0)return 0;return (n[key]*(kcalPer[key]||0))/e*100;}

// 充足率の状態判定(過不足)。返り値: {status:'low'|'ok'|'high'|'na', pct, color}
function nutrientStatus(key,value,targets,energy){
  const t=targets[key]||{};
  // %E系(PFC)
  const pctKeys={protein_g:4,fat_g:9,carb_g:4};
  if((t.min_pct_e!==undefined||t.max_pct_e!==undefined)&&pctKeys[key]){
    if(energy<=0)return {status:"na"};
    const p=value*pctKeys[key]/energy*100;
    if(t.min_pct_e!==undefined&&p<t.min_pct_e-1)return {status:"low",pct:p};
    if(t.max_pct_e!==undefined&&p>t.max_pct_e+1)return {status:"high",pct:p};
    return {status:"ok",pct:p};
  }
  if(key==="sat_fat_g"&&t.max_pct_e!==undefined){
    if(energy<=0)return {status:"na"};
    const p=value*9/energy*100;return p>t.max_pct_e?{status:"high",pct:p}:{status:"ok",pct:p};
  }
  // 上限型(食塩・コレステロール)
  if(t.max!==undefined&&t.target===undefined&&t.min===undefined){
    const lim=t.ideal_max||t.max;const ratio=lim>0?value/lim:0;
    if(value>t.max)return {status:"high",ratio};
    if(value>lim)return {status:"warnhigh",ratio};
    return {status:"ok",ratio};
  }
  // 目標/推奨型(下限重視)
  const goal=t.target!==undefined?t.target:(t.min!==undefined?t.min:null);
  if(goal===null)return {status:"na"};
  const ratio=goal>0?value/goal:0;
  let status="ok";
  if(ratio<0.85)status="low";
  if(t.max!==undefined&&value>t.max)status="high";
  return {status,ratio};
}
function statusColor(s){
  if(s==="low")return "var(--warn)";
  if(s==="high")return "var(--danger)";
  if(s==="warnhigh")return "var(--warn)";
  if(s==="ok")return "var(--ok)";
  return "var(--text-faint)";
}

// ═══════════════ 採点(食事スコア。運動はCoworkが+exercise_max) ═══════════════
function attainMin(v,target){if(target<=0)return 1;return clamp(v/target,0,1);}
function attainMax(v,limit){if(limit<=0)return v<=0?1:0;return clamp(2-v/limit,0,1);} // limit以下=1, 2*limitで0
function scoreDay(totals,profile,cfg){
  const t=profile.targets||{};const e=totals.energy_kcal||0;
  const comps=(cfg.components||[]).map(c=>{
    let a=0;
    if(c.type==="target_band"){
      const tg=(t[c.nutrient]||{}).target||0;const r=tg>0?(totals[c.nutrient]||0)/tg:0;
      const band=c.band||0.1, zero=c.zero_at||0.5;
      const dev=Math.abs(r-1);
      if(dev<=band)a=1; else {const span=(1-zero); a=clamp(1-(dev-band)/span,0,1);}
    } else if(c.type==="pct_e_range"){
      const tt=t[c.nutrient]||{};const p=e>0?(totals[c.nutrient]||0)*(c.kcal_per_g)/e*100:0;
      const lo=tt.min_pct_e,hi=tt.max_pct_e;
      if(p>=lo&&p<=hi)a=1;
      else if(p<lo)a=clamp(1-(lo-p)/lo,0,1);
      else a=clamp(1-(p-hi)/hi,0,1);
    } else if(c.type==="max_pct_e"){
      const p=e>0?(totals[c.nutrient]||0)*(c.kcal_per_g)/e*100:0;a=attainMax(p,c.max_pct);
    } else if(c.type==="max"){
      const lim=(t[c.nutrient]||{})[c.limit_key]||0;a=attainMax(totals[c.nutrient]||0,lim);
    } else if(c.type==="min"){
      const tg=(t[c.nutrient]||{})[c.target_key]||0;a=attainMin(totals[c.nutrient]||0,tg);
    } else if(c.type==="min_avg"){
      const arr=c.nutrients.map(nk=>{const tg=(t[nk]||{})[c.target_key||"target"]||0;return attainMin(totals[nk]||0,tg);});
      a=arr.reduce((s,x)=>s+x,0)/(arr.length||1);
    }
    return {id:c.id,label:c.label,weight:c.weight,attain:a,score:a*c.weight};
  });
  const mealScore=comps.reduce((s,c)=>s+c.score,0);
  return {comps,mealScore,mealMax:cfg.meal_max||100,exerciseMax:cfg.exercise_max||0};
}
function scoreColor(ratio){if(ratio>=0.85)return "var(--ok)";if(ratio>=0.6)return "var(--warn)";return "var(--danger)";}

// ═══════════════ 栄養素テーブル ═══════════════
function targetText(key,targets){
  const t=targets[key]||{};
  if(t.min_pct_e!==undefined&&t.max_pct_e!==undefined)return `${t.min_pct_e}–${t.max_pct_e}%E`;
  if(t.max_pct_e!==undefined)return `≤${t.max_pct_e}%E`;
  if(t.max!==undefined&&t.target===undefined&&t.min===undefined)return `≤${t.ideal_max||t.max}`;
  if(t.target!==undefined)return `${t.target}`+(t.max?`（上限${t.max}）`:"");
  if(t.min!==undefined)return `≥${t.min}`;
  return "—";
}
function suffCell(key,v,targets,e){
  const t=targets[key]||{};const meta=NMETA[key];const u=meta.unit;const pk={protein_g:4,fat_g:9,carb_g:4};
  if(t.min_pct_e!==undefined&&pk[key]){
    if(e<=0)return {text:"—",color:"var(--text-faint)"};
    const p=v*pk[key]/e*100;
    if(p<t.min_pct_e)return {text:"不足 "+round(t.min_pct_e-p,0)+"%E",color:"var(--warn)"};
    if(t.max_pct_e!==undefined&&p>t.max_pct_e)return {text:"過剰 +"+round(p-t.max_pct_e,0)+"%E",color:"var(--danger)"};
    return {text:"適正 "+round(p,0)+"%E",color:"var(--ok)"};
  }
  if(key==="sat_fat_g"&&t.max_pct_e!==undefined){
    if(e<=0)return {text:"—",color:"var(--text-faint)"};
    const lim=e*t.max_pct_e/100/9;const d=lim-v;
    return d>=0?{text:"余裕 "+round(d,1)+u,color:"var(--ok)"}:{text:"超過 +"+round(-d,1)+u,color:"var(--danger)"};
  }
  if(t.max!==undefined&&t.target===undefined&&t.min===undefined){
    const lim=t.ideal_max||t.max;const d=lim-v;
    return d>=0?{text:"余裕 "+round(d,meta.dec)+u,color:"var(--ok)"}:{text:"超過 +"+round(-d,meta.dec)+u,color:"var(--danger)"};
  }
  const goal=t.target!==undefined?t.target:(t.min!==undefined?t.min:null);
  if(goal===null)return {text:"—",color:"var(--text-faint)"};
  const d=goal-v;
  if(d>0)return {text:"あと "+round(d,meta.dec)+u,color:(v/goal<0.85?"var(--warn)":"var(--text-dim)")};
  if(t.max!==undefined&&v>t.max)return {text:"過剰 +"+round(v-t.max,meta.dec)+u,color:"var(--danger)"};
  return {text:"達成 +"+round(v-goal,meta.dec)+u,color:"var(--ok)"};
}
function barGeom(key,value,targets,e){
  const t=targets[key]||{};const pk={protein_g:4,fat_g:9,carb_g:4};
  let axisVal,scaleMax,zs,ze,tick;
  if(t.min_pct_e!==undefined&&pk[key]){
    axisVal=e>0?value*pk[key]/e*100:0;
    const lo=t.min_pct_e,hi=t.max_pct_e!==undefined?t.max_pct_e:lo*1.5;
    scaleMax=hi*1.7;zs=lo/scaleMax;ze=hi/scaleMax;tick=lo/scaleMax;
  }else if(key==="sat_fat_g"&&t.max_pct_e!==undefined){
    axisVal=e>0?value*9/e*100:0;const lim=t.max_pct_e;scaleMax=lim*2.4;zs=0;ze=lim/scaleMax;tick=lim/scaleMax;
  }else if(t.max!==undefined&&t.target===undefined&&t.min===undefined){
    axisVal=value;const lim=t.ideal_max||t.max;scaleMax=lim*1.8;zs=0;ze=lim/scaleMax;tick=lim/scaleMax;
  }else{
    axisVal=value;const goal=t.target!==undefined?t.target:(t.min!==undefined?t.min:0);
    if(goal<=0)return null;
    const up=t.max!==undefined?t.max:null;
    scaleMax=up?Math.max(up*1.05,goal*1.7):goal*1.7;
    zs=goal/scaleMax;ze=up?up/scaleMax:1;tick=goal/scaleMax;
  }
  if(!scaleMax||scaleMax<=0)return null;
  return {fill:clamp(axisVal/scaleMax,0,1)*100,zs:clamp(zs,0,1)*100,zw:clamp(ze-zs,0,1)*100,tick:clamp(tick,0,1)*100};
}
function NutrientTable({totals,targets}){
  const e=totals.energy_kcal||0;
  const groups=[];const seen={};
  NUTRI.forEach(n=>{if(!seen[n.g]){seen[n.g]=[];groups.push([n.g,seen[n.g]]);}seen[n.g].push(n);});
  return (
    <div className="card">
      <div className="sect-h">栄養素一覧（摂取量と適正範囲）</div>
      {groups.map(([gname,items])=>(
        <div key={gname}>
          <div className="grp-h2">{gname}</div>
          {items.map(n=>{
            const v=totals[n.k]||0;const sc=suffCell(n.k,v,targets,e);const st=nutrientStatus(n.k,v,targets,e);
            const g=barGeom(n.k,v,targets,e);const col=v===0?"var(--text-faint)":statusColor(st.status);
            return (
              <div key={n.k} className="nrow">
                <div className="spread" style={{marginBottom:4}}>
                  <span className="sm">{n.label}<span className="tiny faint"> {n.unit}</span></span>
                  <span className="mono sm" style={{color:col,fontWeight:600}}>{fmtNum(v,n.dec)}<span className="tiny faint"> / {targetText(n.k,targets)}</span></span>
                </div>
                {g?(
                  <div className="gbar">
                    {g.zw>0&&<div className="gzone" style={{left:g.zs+"%",width:g.zw+"%"}}/>}
                    <div className="gfill" style={{width:g.fill+"%",background:col}}/>
                    {g.tick>1&&g.tick<99&&<div className="gtick" style={{left:g.tick+"%"}}/>}
                  </div>
                ):<div className="gbar"/>}
                <div className="tiny" style={{color:sc.color,marginTop:3}}>{sc.text}</div>
              </div>
            );
          })}
        </div>
      ))}
      <div className="tiny faint" style={{marginTop:10}}>緑帯=適正範囲、バー=摂取量、縦線=目標/上限。基準: 食事摂取基準2025（18–29歳男性・あすけん相当）。</div>
    </div>
  );
}

function AddSheet({state,date,slot,onClose,onAdd,onAddRaw}){

  const [rawName,setRawName]=useState("");const [rawStore,setRawStore]=useState("");

    const counts={},last={};

  },[state.logs]);

  else if(tab==="freq")list=[...master].filter(f=>usage.counts[f.id]).sort((a,b)=>(usage.counts[b.id]||0)-(usage.counts[a.id]||0)).slice(0,40);
  else if(tab==="sets")list=sets;

          <label className="lab">メニュー名</label>
          <input className="in" value={rawName} onChange={e=>setRawName(e.target.value)} placeholder="例：日替わり 鶏の黒酢あん" style={{marginBottom:10}}/>
          <label className="lab">店舗（任意）</label>
          <input className="in" value={rawStore} onChange={e=>setRawStore(e.target.value)} placeholder="例：魚半" style={{marginBottom:14}}/>
          <button className="btn" style={{width:"100%"}} disabled={!rawName.trim()} onClick={()=>{onAddRaw({raw_name:rawName.trim(),raw_store:rawStore.trim()});}}>未登録として記録</button>
        </div>
      ):(
        <div>
          {list.length===0&&<div className="empty">該当なし</div>}

                <div style={{minWidth:0}}>
                  <div className="med" style={{fontWeight:500,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{f.name_ja}</span>
                    {f.store&&<span className="badge store">{f.store}</span>}
                    {f.members&&<span className="badge">セット</span>}

      )}

  );
}

function DayScreen({state,date,setDate,update}){
  const [adding,setAdding]=useState(null);
  const [editing,setEditing]=useState(null);
  const {total,per,anyPending}=useMemo(()=>dayTotals(state,date),[state,date]);
  const meals=dayMeals(state,date);
  const bySlot={};SLOTS.forEach(s=>bySlot[s.id]=meals.filter(m=>m.slot===s.id));
  function addMeal(slot,payload){
    update(ns=>{const day=ensureDay(ns,date);day.meals.push({log_id:gid(),slot,food_id:payload.food_id,qty:payload.qty||1,needs_lookup:false,ts:nowTs()});});
    setAdding(null);
  }
  function addRaw(slot,payload){
    update(ns=>{const day=ensureDay(ns,date);day.meals.push({log_id:gid(),slot,food_id:null,raw_name:payload.raw_name,raw_store:payload.raw_store,qty:1,needs_lookup:true,lookup_status:"pending",ts:nowTs()});if(payload.raw_name&&!(ns.menus||[]).includes(payload.raw_name)){ns.menus=[...(ns.menus||[]),payload.raw_name];}recomputeFlag(ns);});
    setAdding(null);
  }
  function copyPrev(){
    const prev=addD(date,-1);const pm=dayMeals(state,prev);
    if(!pm.length)return;
    update(ns=>{const day=ensureDay(ns,date);pm.forEach(m=>day.meals.push({...m,log_id:gid(),ts:nowTs()}));});
  }
  return (
    <div>
      <div className="card tight">
        <div className="datenav">
          <button className="nav-btn" onClick={()=>setDate(addD(date,-1))}>‹</button>
          <div className="d">{fmtDate(date)}<span className="dow">({dow(date)})</span></div>
          <button className="nav-btn" onClick={()=>setDate(addD(date,1))}>›</button>
        </div>
        <div className="row gap8" style={{justifyContent:"center",marginTop:4}}>
          {date!==today()&&<button className="chip" onClick={()=>setDate(today())}>今日へ</button>}
          <button className="chip" onClick={copyPrev}>前日をコピー</button>
          <input type="date" className="chip mono" value={date} onChange={e=>e.target.value&&setDate(e.target.value)} style={{colorScheme:"dark"}}/>
        </div>
      </div>

      <ScoreCard totals={total} profile={state.profile} cfg={state.scoring_config} pending={anyPending}/>

      <div className="card">
        <div className="spread" style={{marginBottom:10}}>
          <div className="sect-h" style={{margin:0}}>記録</div>
          <div className="mono sm muted">合計 {Math.round(total.energy_kcal)} kcal</div>
        </div>
        {SLOTS.map(s=>(
          <SlotBlock key={s.id} slot={s} master={state.food_master} meals={bySlot[s.id]} totals={per[s.id]}
            onAdd={()=>setAdding(s.id)} onTapMeal={(m)=>setEditing(m)}/>
        ))}
      </div>

      <NutrientTable totals={total} targets={state.profile.targets}/>

      {adding&&<AddSheet state={state} date={date} slot={adding} onClose={()=>setAdding(null)}
        onAdd={(p)=>addMeal(adding,p)} onAddRaw={(p)=>addRaw(adding,p)}/>}
      {editing&&<MealEditSheet state={state} meal={editing} onClose={()=>setEditing(null)}
        onSave={(p)=>{update(ns=>{const m=findMeal(ns,date,editing.log_id);if(m){m.qty=p.qty;if(m.food_id===null){m.raw_name=p.raw_name;m.raw_store=p.raw_store;}}});setEditing(null);}}
        onDelete={()=>{update(ns=>{const day=ensureDay(ns,date);day.meals=day.meals.filter(x=>x.log_id!==editing.log_id);});setEditing(null);}}
        onDup={()=>{update(ns=>{const day=ensureDay(ns,date);const src=day.meals.find(x=>x.log_id===editing.log_id);if(src)day.meals.push({...src,log_id:gid(),ts:nowTs()});});setEditing(null);}}/>}
    </div>
  );
}
function ensureDay(st,date){const mo=monthOf(date);if(!st.logs[mo])st.logs[mo]={month:mo,days:{}};if(!st.logs[mo].days[date])st.logs[mo].days[date]={meals:[]};return st.logs[mo].days[date];}
function findMeal(st,date,logId){const day=ensureDay(st,date);return day.meals.find(m=>m.log_id===logId);}

  const k=q.trim().toLowerCase();
  let list=state.food_master.filter(f=>{
    if(cat&&f.category!==cat)return false;
    if(k&&!(f.name_ja+f.name_kana+(f.store||"")).toLowerCase().includes(k))return false;
    return true;
  });
  list=[...list].sort((a,b)=>(a.store||"~").localeCompare(b.store||"~","ja")||a.name_kana.localeCompare(b.name_kana,"ja"));
  function saveFood(out){update(ns=>{const i=ns.food_master.findIndex(x=>x.id===out.id);if(i>=0)ns.food_master[i]=out;else ns.food_master.push(out);});setEditing(null);setCreating(false);}
  function delFood(id){update(ns=>{ns.food_master=ns.food_master.filter(x=>x.id!==id);});setEditing(null);}
  function toggleFav(id){update(ns=>{const s=new Set(ns.favorites||[]);if(s.has(id))s.delete(id);else s.add(id);ns.favorites=[...s];});}
  function addMenu(){const name=(window.prompt("新しいメニュー名を入力（栄養素はCoworkが後で補完します）")||"").trim();if(!name)return;update(ns=>{if(!(ns.menus||[]).includes(name))ns.menus=[...(ns.menus||[]),name];recomputeFlag(ns);});}
  return (
    <div>
      <div className="card tight">
        <input className="in" placeholder="かな・漢字・店名で検索" value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:10}}/>
        <div className="row gap6 wrap">
          <button className={"chip"+(cat===""?" on":"")} onClick={()=>setCat("")}>全て</button>
          {CATEGORIES.map(c=><button key={c} className={"chip"+(cat===c?" on":"")} onClick={()=>setCat(c)}>{c}</button>)}
        </div>
      </div>
      <div className="spread" style={{margin:"0 4px 10px"}}>
        <div className="mono sm muted">{list.length} 件 · 閲覧専用</div>
        <button className="btn sm" onClick={addMenu}>＋ 新規メニュー</button>
      </div>
      <div className="card">
        {list.length===0&&<div className="empty">該当する食品がありません</div>}
        {list.map(f=>{const n=foodNutrients(state.food_master,f);return (
          <div key={f.id} className="list-item">
            <div style={{minWidth:0}}>
              <div className="med" style={{fontWeight:500,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{f.name_ja}</span>
                {f.store&&<span className="badge store">{f.store}</span>}
                {f.members&&<span className="badge">セット</span>}
                <ConfBadge c={f.confidence}/>
              </div>
              <div className="tiny faint">{f.category} · {Math.round(n.energy_kcal)}kcal · P{round(n.protein_g,0)}/F{round(n.fat_g,0)}/C{round(n.carb_g,0)} · {f.source}</div>
            </div>
            <button className="x" onClick={()=>toggleFav(f.id)} style={{color:(state.favorites||[]).includes(f.id)?"var(--warn)":"var(--text-faint)"}}>{(state.favorites||[]).includes(f.id)?"★":"☆"}</button>
          </div>
        );})}
      </div>
      {(editing||creating)&&<FoodEditSheet state={state} food={editing} onClose={()=>{setEditing(null);setCreating(false);}} onSave={saveFood} onDelete={()=>delFood(editing.id)}/>}
    </div>
  );
}

// ═══════════════ 推移画面 ═══════════════
function LineChart({series,target,unit,color,days}){
  const W=640,H=200,pl=40,pr=12,pt=14,pb=24;
  const max=Math.max(target||0,...series.map(s=>s.v),1)*1.15;
  const x=i=>pl+(W-pl-pr)*(series.length<=1?0.5:i/(series.length-1));
  const y=v=>H-pb-(H-pt-pb)*clamp(v/max,0,1);
  const path=series.map((s,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(s.v).toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block"}} preserveAspectRatio="xMidYMid meet">
      {[0,0.5,1].map(g=>{const yy=pt+(H-pt-pb)*g;return <line key={g} x1={pl} y1={yy} x2={W-pr} y2={yy} stroke="var(--border)" strokeWidth="1"/>;})}
      <text x="2" y={pt+4} fill="var(--text-faint)" style={{fontFamily:"var(--mono)",fontSize:9}}>{Math.round(max)}</text>
      {target?<line x1={pl} y1={y(target)} x2={W-pr} y2={y(target)} stroke="var(--accent)" strokeDasharray="4 4" strokeWidth="1.2"/>:null}
      {target?<text x={W-pr} y={y(target)-3} textAnchor="end" fill="var(--accent)" style={{fontFamily:"var(--mono)",fontSize:9}}>目標{target}</text>:null}
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      {series.map((s,i)=><circle key={i} cx={x(i)} cy={y(s.v)} r="2.6" fill={color}/>)}
      {series.map((s,i)=> (i%Math.ceil(series.length/7||1)===0||i===series.length-1)?<text key={"t"+i} x={x(i)} y={H-7} textAnchor="middle" fill="var(--text-faint)" style={{fontFamily:"var(--mono)",fontSize:8.5}}>{s.label}</text>:null)}
    </svg>
  );
}
function TrendsScreen({state}){
  const [range,setRange]=useState(14);
  const [metric,setMetric]=useState("energy_kcal");
  const metrics=[["energy_kcal","エネルギー","kcal","#5b9dff"],["score","食事スコア","点","#46c98b"],["protein_g","たんぱく質","g","#5b9dff"],["fat_g","脂質","g","#e0a93b"],["carb_g","炭水化物","g","#46c98b"],["salt_g","食塩","g","#f2557a"],["fiber_g","食物繊維","g","#46c98b"],["vegetable_g","野菜量","g","#46c98b"],["calcium_mg","カルシウム","mg","#e879f9"]];
  const m=metrics.find(x=>x[0]===metric);
  const series=useMemo(()=>{
    const arr=[];const end=today();
    for(let i=range-1;i>=0;i--){const d=addD(end,-i);const {total}=dayTotals(state,d);
      let v=0;if(metric==="score"){v=scoreDay(total,state.profile,state.scoring_config).mealScore;}else v=total[metric]||0;
      arr.push({label:fmtShort(d),v:round(v,1),date:d});}
    return arr;
  },[state,range,metric]);
  const t=state.profile.targets[metric]||{};
  let target=null;
  if(metric==="score")target=state.scoring_config.meal_max;
  else if(t.target!==undefined)target=t.target;else if(t.min!==undefined)target=t.min;else if(t.max!==undefined)target=t.ideal_max||t.max;
  const avg=series.length?round(series.reduce((s,x)=>s+x.v,0)/series.length,1):0;
  const logged=series.filter(s=>{const dm=dayMeals(state,s.date);return dm.length>0;}).length;
  return (
    <div>
      <div className="card tight">
        <div className="seg" style={{marginBottom:10}}>
          {[[7,"7日"],[14,"14日"],[30,"30日"]].map(([d,l])=><button key={d} className={range===d?"on":""} onClick={()=>setRange(d)}>{l}</button>)}
        </div>
        <div className="row gap6 wrap">
          {metrics.map(x=><button key={x[0]} className={"chip"+(metric===x[0]?" on":"")} onClick={()=>setMetric(x[0])}>{x[1]}</button>)}
        </div>
      </div>
      <div className="card">
        <div className="spread" style={{marginBottom:6}}>
          <div className="sect-h" style={{margin:0}}>{m[1]}の推移</div>
          <div className="mono sm muted">平均 {avg} {m[2]}</div>
        </div>
        <LineChart series={series} target={target} unit={m[2]} color={m[3]}/>
        <div className="tiny faint" style={{marginTop:6}}>記録のある日：{logged}/{range}日。点線は目標値。</div>
      </div>
    </div>
  );
}

// ═══════════════ 設定画面 ═══════════════
function SettingsScreen({state,update,reload,cloud}){
  const [cfg,setCfg]=useState({gasUrl:CFG.gasUrl||"",apiKey:CFG.apiKey||DEFAULT_API_KEY});
  const [msg,setMsg]=useState("");
  const [impText,setImpText]=useState("");
  const [showTargets,setShowTargets]=useState(false);
  const [showWeights,setShowWeights]=useState(false);
  function saveConn(){CFG={...CFG,gasUrl:cfg.gasUrl.trim(),apiKey:cfg.apiKey.trim()};saveCfg(CFG);setMsg("接続設定を保存しました。再読み込みします…");setTimeout(reload,600);}
  function exportJson(){const blob=new Blob([JSON.stringify(state,null,1)],{type:"application/json"});const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download="mealtracker-"+today()+".json";a.click();URL.revokeObjectURL(u);}
  function importJson(){try{const d=migrate(JSON.parse(impText));update(()=>{},d);setMsg("インポートしました。");setImpText("");}catch(e){setMsg("JSONの読み取りに失敗: "+e.message);}}
  function reseed(){if(!confirm("一般食シードを再投入します（既存IDは上書き）。よろしいですか？"))return;update(ns=>{const map=Object.fromEntries(ns.food_master.map(f=>[f.id,f]));SEED.food_master_seed.forEach(s=>{map[s.id]=deepCopy(s);});ns.food_master=Object.values(map);});setMsg("一般食シードを再投入しました。");}
  const p=state.profile;
  function setProf(k,v){update(ns=>{ns.profile[k]=v;});}
  function setTarget(key,field,v){update(ns=>{if(!ns.profile.targets[key])ns.profile.targets[key]={};if(v==="")delete ns.profile.targets[key][field];else ns.profile.targets[key][field]=parseFloat(v);});}
  function setWeight(id,v){update(ns=>{const c=ns.scoring_config.components.find(x=>x.id===id);if(c)c.weight=parseFloat(v)||0;});}
  const totW=state.scoring_config.components.reduce((s,c)=>s+c.weight,0);
  return (
    <div>
      <div className="card">
        <div className="sect-h">Drive接続（Google Apps Script）</div>
        <div className="tiny faint" style={{marginBottom:10}}>同梱の <span className="mono">google-apps-script-meal.js</span> をデプロイし、発行URLと合言葉を設定してください。study-trackerとは別のドキュメント・別の合言葉にしてください。</div>
        <label className="lab">GAS ウェブアプリ URL</label>
        <input className="in mono" style={{fontSize:11,marginBottom:10}} value={cfg.gasUrl} onChange={e=>setCfg(c=>({...c,gasUrl:e.target.value}))} placeholder="https://script.google.com/macros/s/…/exec"/>
        <label className="lab">API キー（合言葉）</label>
        <input className="in mono" style={{fontSize:12,marginBottom:12}} value={cfg.apiKey} onChange={e=>setCfg(c=>({...c,apiKey:e.target.value}))}/>
        <div className="row gap8"><button className="btn" onClick={saveConn}>保存して接続</button><span className={"cloud "+cloud.cls} style={{alignSelf:"center"}}>{cloud.txt}</span></div>
      </div>

      <div className="card">
        <div className="sect-h">プロフィール</div>
        <div className="grid2">
          <div><label className="lab">性別</label><select className="in" value={p.sex} onChange={e=>setProf("sex",e.target.value)}><option value="male">男性</option><option value="female">女性</option></select></div>
          <div><label className="lab">生まれ年</label><input className="in mono" type="number" value={p.birth_year} onChange={e=>setProf("birth_year",parseInt(e.target.value)||0)}/></div>
          <div><label className="lab">身長 cm</label><input className="in mono" type="number" value={p.height_cm} onChange={e=>setProf("height_cm",parseFloat(e.target.value)||0)}/></div>
          <div><label className="lab">身体活動レベル</label><select className="in" value={p.activity_level} onChange={e=>setProf("activity_level",e.target.value)}><option value="low">低い</option><option value="normal">ふつう</option><option value="high">高い</option></select></div>
        </div>
        <div className="tiny faint" style={{marginTop:8}}>初期の目標値は食事摂取基準2025（18–29歳男性・低い=2250kcal）です。下で各栄養素を調整できます。</div>
      </div>

      <div className="card tight">
        <button className="spread" style={{width:"100%"}} onClick={()=>setShowTargets(v=>!v)}><span className="sect-h" style={{margin:0}}>栄養目標値の編集</span><span className="muted">{showTargets?"▲":"▼"}</span></button>
        {showTargets&&<div style={{marginTop:10}}>
          {NUTRI.map(n=>{const t=p.targets[n.k]||{};return (
            <div key={n.k} className="spread" style={{padding:"6px 0",borderBottom:"1px solid var(--border)",gap:8,flexWrap:"wrap"}}>
              <span className="sm" style={{minWidth:110}}>{n.label}<span className="tiny faint"> {n.unit}</span></span>
              <div className="row gap6 wrap">
                {["target","min","max","min_pct_e","max_pct_e","ideal_max"].map(field=> t[field]!==undefined||["target","min","max"].includes(field)?(
                  <div key={field} className="row gap6" style={{display: (t[field]!==undefined||(field==="target"&&t.min===undefined&&t.min_pct_e===undefined))?"flex":"none"}}>
                    <span className="tiny faint">{field}</span>
                    <input className="in mono" style={{width:64,padding:"4px 6px",fontSize:11}} type="number" step="any" defaultValue={t[field]!==undefined?t[field]:""} onBlur={e=>setTarget(n.k,field,e.target.value)}/>
                  </div>
                ):null)}
              </div>
            </div>
          );})}
        </div>}
      </div>

      <div className="card tight">
        <button className="spread" style={{width:"100%"}} onClick={()=>setShowWeights(v=>!v)}><span className="sect-h" style={{margin:0}}>採点の重み（食事スコア {totW}点 ＋運動{state.scoring_config.exercise_max}点）</span><span className="muted">{showWeights?"▲":"▼"}</span></button>
        {showWeights&&<div style={{marginTop:10}}>
          {state.scoring_config.components.map(c=>(
            <div key={c.id} className="spread" style={{padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
              <span className="sm">{c.label}</span>
              <input className="in mono" style={{width:70,padding:"5px 8px"}} type="number" step="1" defaultValue={c.weight} onBlur={e=>setWeight(c.id,e.target.value)}/>
            </div>
          ))}
          <div className="tiny faint" style={{marginTop:8}}>合計 {totW}点（運動{state.scoring_config.exercise_max}点はCoworkが加算し100点満点）。あすけんの正確な式は非公開のため、食事摂取基準に基づく調整可能な近似です。</div>
        </div>}
      </div>

      <div className="card">
        <div className="sect-h">データ入出力 / メンテナンス</div>
        <div className="row gap8 wrap" style={{marginBottom:10}}>
          <button className="btn ghost sm" onClick={exportJson}>JSONエクスポート</button>
          <button className="btn ghost sm" onClick={reseed}>一般食シード再投入</button>
        </div>
        <label className="lab">JSONインポート（貼り付け）</label>
        <textarea className="in mono" style={{fontSize:11,minHeight:70}} value={impText} onChange={e=>setImpText(e.target.value)} placeholder='{"schemaVersion":1,...}'/>
        <button className="btn ghost sm" style={{marginTop:8}} onClick={importJson} disabled={!impText.trim()}>インポート実行</button>
        {msg&&<div className="tiny" style={{marginTop:10,color:"var(--accent)"}}>{msg}</div>}
      </div>
      <div className="tiny faint center" style={{padding:"4px 0 10px"}}>食事管理トラッカー v1 · データは本人のGoogle Driveのみに保存 · ダーク固定</div>
    </div>
  );
}

// ═══════════════ App ═══════════════
function App(){
  const [state,setState]=useState(null);
  const [tab,setTab]=useState("day");
  const [date,setDate]=useState(today());
  const [cloud,setCloud]=useState({cls:"sync",txt:"読み込み中"});
  const loadedRef=useRef(false);
  const timerRef=useRef(null);
  const firstSaveSkip=useRef(true);

  const doLoad=useCallback(async()=>{
    setCloud({cls:"sync",txt:"読み込み中"});
    const {state:st,from}=await loadAll();
    firstSaveSkip.current=true;
    loadedRef.current=true;
    setState(st);
    if(from==="cloud")setCloud({cls:"ok",txt:"Drive同期済"});
    else if(from==="local")setCloud({cls:gasUrl()?"err":"",txt:gasUrl()?"ローカル（同期失敗）":"ローカル保存"});
    else setCloud({cls:"",txt:gasUrl()?"新規":"未接続 → 設定"});
  },[]);
  useEffect(()=>{doLoad();},[doLoad]);

  useEffect(()=>{
    if(!state||!loadedRef.current)return;
    saveLocal(state);
    if(firstSaveSkip.current){firstSaveSkip.current=false;return;}
    if(!gasUrl())return;
    if(timerRef.current)clearTimeout(timerRef.current);
    setCloud({cls:"sync",txt:"保存中…"});
    timerRef.current=setTimeout(async()=>{
      const ok=await saveCloud(state);
      setCloud(ok?{cls:"ok",txt:"Drive保存済"}:{cls:"err",txt:"保存失敗（ローカル可）"});
    },1200);
  },[state]);

  const update=useCallback((fn,replace)=>{
    setState(prev=>{const ns=replace?migrate(replace):deepCopy(prev);if(fn)fn(ns);return ns;});
  },[]);

  if(!state)return <div className="app" style={{paddingTop:80,textAlign:"center"}}><div className="muted">読み込み中…</div></div>;

  const tabs=[["day","今日","🍽"],["master","マスター","📚"],["trends","推移","📈"],["settings","設定","⚙"]];
  return (
    <div>
      <div className="topbar"><div className="topbar-in">
        <div className="brand"><span className="dot"/>食事管理トラッカー</div>
        <span className={"cloud "+cloud.cls}>{cloud.txt}</span>
      </div></div>
      <div className="app">
        {tab==="day"&&<DayScreen state={state} date={date} setDate={setDate} update={update}/>}
        {tab==="master"&&<MasterScreen state={state} update={update}/>}
        {tab==="trends"&&<TrendsScreen state={state}/>}
        {tab==="settings"&&<SettingsScreen state={state} update={update} reload={doLoad} cloud={cloud}/>}
      </div>
      <div className="tabbar"><div className="tabbar-in">
        {tabs.map(([id,l,ic])=><button key={id} className={"tab"+(tab===id?" active":"")} onClick={()=>setTab(id)}><span className="ic">{ic}</span>{l}</button>)}
      </div></div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
